const addM = (k,n) => { const [y,m]=k.split('-').map(Number); const d=new Date(y,m-1+n,1); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; };

// ── BUSINESS LOGIC ────────────────────────────────────────────────────────────
const gParcelas = c => {
  if(!c||c.status!=='ativo') return [];
  const ps=[];
  if(c.recorrente){
    let m=c.mesInicio, fim=`${ANO+1}-12`;
    while(m<=fim){ if(!c.mesCancel||m<=c.mesCancel) ps.push({mes:m,valor:c.valorMensal}); m=addM(m,1); }
  } else {
    for(let i=0;i<c.numParcelas;i++) ps.push({mes:addM(c.mesInicio,i),valor:c.valorParcela});
  }
  return ps;
};
const gExp = d => {
  if(!d.ativo) return [];
  if(!d.recorrente) return [{mes:d.mesInicio,valor:d.valor}];
  const es=[]; let m=d.mesInicio, fim=`${ANO+1}-12`;
  while(m<=fim){ es.push({mes:m,valor:d.valor}); m=addM(m,1); }
  return d.mesFim?es.filter(e=>e.mes<=d.mesFim):es;
};
const buildFluxo = (contratos=[],despesas=[],conf={},despReal={},ano=ANO) =>
  mesAno(ano).map(mes=>{
    let prev=0,rec=0,dPrev=0,dReal=0;
    contratos.forEach(c=>{ const p=gParcelas(c).find(x=>x.mes===mes); if(p){ prev+=p.valor; const k=`${c.id}_${mes}`; if(conf[k]?.ok) rec+=conf[k].valor??p.valor; } });
    despesas.forEach(d=>{ const e=gExp(d).find(x=>x.mes===mes); if(e){ dPrev+=e.valor; const k=`${d.id}_${mes}`; if(despReal[k]?.ok) dReal+=despReal[k].valor??e.valor; } });
    return {mes,nome:MC[midx(mes)],prev,rec,dPrev,dReal,saldoPrev:prev-dPrev,saldoReal:rec-dReal};
  });

const calcMRR = (contratos=[]) => {
  const m=mesNow();
  return contratos.filter(c=>c.recorrente&&c.status==='ativo'&&c.mesInicio<=m&&(!c.mesCancel||c.mesCancel>=m)).reduce((s,c)=>s+c.valorMensal,0);
};

const calcInadimplentes = (contratos=[], conf={}) => {
  const hoje = mesNow();
  const mAnterior = addM(hoje, -1);
  const result = [];
  contratos.forEach(c => {
    [mAnterior, hoje].forEach(mes => {
      if(mes > hoje) return;
      const ps = gParcelas(c).find(p=>p.mes===mes);
      if(ps) {
        const k = `${c.id}_${mes}`;
        if(!conf[k]?.ok) result.push({cliente:c.cliente, servico:c.servico, mes, valor:ps.valor});
      }
    });
  });
  return result;
};

// ── CHART COMPONENTS ─────────────────────────────────────────────────────────
function BarChart({data,keys,colors,labels,height=200}){
  const ref=useRef(null),inst=useRef(null);
  useEffect(()=>{
    if(!ref.current) return;
    if(inst.current) inst.current.destroy();
    inst.current=new Chart(ref.current,{type:'bar',data:{labels:data.map(d=>d.nome),datasets:keys.map((k,i)=>({label:labels[i],data:data.map(d=>d[k]),backgroundColor:colors[i],borderRadius:3,borderSkipped:false}))},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>brl(ctx.raw)}}},scales:{x:{grid:{display:false},ticks:{font:{size:11},color:'#A8A29E'},border:{display:false}},y:{grid:{color:'#F0EDE8'},ticks:{font:{size:11},color:'#A8A29E',callback:v=>`R$${(v/1000).toFixed(0)}k`},border:{display:false}}}}});
    return ()=>{if(inst.current){inst.current.destroy();inst.current=null;}};
  },[JSON.stringify(data)]);
  return React.createElement('div',{style:{position:'relative',height}},React.createElement('canvas',{ref}));
}

function StackedBarChart({data,keys,colors,labels,height=200}){
  const ref=useRef(null),inst=useRef(null);
  useEffect(()=>{
    if(!ref.current) return;
    if(inst.current) inst.current.destroy();
    inst.current=new Chart(ref.current,{type:'bar',data:{labels:data.map(d=>d.nome),datasets:keys.map((k,i)=>({label:labels[i],data:data.map(d=>d[k]),backgroundColor:colors[i],borderRadius:i===keys.length-1?3:0,stack:'a'}))},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>brl(ctx.raw)}}},scales:{x:{grid:{display:false},ticks:{font:{size:11},color:'#A8A29E'},border:{display:false},stacked:true},y:{grid:{color:'#F0EDE8'},ticks:{font:{size:11},color:'#A8A29E',callback:v=>`R$${(v/1000).toFixed(0)}k`},border:{display:false},stacked:true}}}});
    return ()=>{if(inst.current){inst.current.destroy();inst.current=null;}};
  },[JSON.stringify(data)]);
  return React.createElement('div',{style:{position:'relative',height}},React.createElement('canvas',{ref}));
}

function DonutChart({data,height=150}){
  const ref=useRef(null),inst=useRef(null);
  useEffect(()=>{
    if(!ref.current||!data.length) return;
    if(inst.current) inst.current.destroy();
    inst.current=new Chart(ref.current,{type:'doughnut',data:{labels:data.map(d=>d.n),datasets:[{data:data.map(d=>d.v),backgroundColor:CORES,borderWidth:0,hoverOffset:4}]},options:{responsive:true,maintainAspectRatio:false,cutout:'65%',plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>brl(ctx.raw)}}}}});
    return ()=>{if(inst.current){inst.current.destroy();inst.current=null;}};
  },[JSON.stringify(data)]);
  return React.createElement('div',{style:{position:'relative',height}},React.createElement('canvas',{ref}));
}

function AreaChart({data,dataKey,height=170}){
  const ref=useRef(null),inst=useRef(null);
  useEffect(()=>{
    if(!ref.current) return;
    if(inst.current) inst.current.destroy();
    inst.current=new Chart(ref.current,{type:'line',data:{labels:data.map(d=>d.nome),datasets:[{data:data.map(d=>d[dataKey]),borderColor:'#A67C52',backgroundColor:'rgba(166,124,82,0.08)',fill:true,tension:0.4,borderWidth:2,pointRadius:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>brl(ctx.raw)}}},scales:{x:{grid:{display:false},ticks:{font:{size:11},color:'#A8A29E'},border:{display:false}},y:{grid:{color:'#F0EDE8'},ticks:{font:{size:11},color:'#A8A29E',callback:v=>`R$${(v/1000).toFixed(0)}k`},border:{display:false}}}}});
    return ()=>{if(inst.current){inst.current.destroy();inst.current=null;}};
  },[JSON.stringify(data)]);
  return React.createElement('div',{style:{position:'relative',height}},React.createElement('canvas',{ref}));
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function Dashboard({fluxo,mrr,fma,totalPrev,totalRec,porServico,inadimplentes,data,ano}){
  const totalDesp=fluxo.reduce((s,m)=>s+m.dReal,0);
  const margem=totalRec>0?Math.round((totalRec-totalDesp)/totalRec*100):0;
  const metaAnual=data.metas?.anual||0;

  // Concentração por cliente
  const conc={};
  data.contratos.forEach(c=>{
    gParcelas(c).filter(p=>p.mes.startsWith(String(ano))).forEach(p=>{ conc[c.cliente]=(conc[c.cliente]||0)+p.valor; });
  });
  const totalConc=Object.values(conc).reduce((s,v)=>s+v,0);
  const concList=Object.entries(conc).sort((a,b)=>b[1]-a[1]).slice(0,4);

  const cards=[
    {l:'MRR',v:brl(mrr),s:'Receita recorrente mensal'},
    {l:'Recebido no Mês',v:brl(fma.rec||0),s:`de ${brl(fma.prev||0)} previsto`},
    {l:'Margem do Ano',v:`${margem}%`,s:'Receita menos despesas pagas'},
    {l:'Previsto no Ano',v:brl(totalPrev),s:'Soma de todos os contratos'},
  ];

  return React.createElement('div',null,
    // Cards
    React.createElement('div',{style:{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:20}},
      cards.map((c,i)=>React.createElement('div',{key:i,style:S.card},
        React.createElement('div',{style:{fontSize:11,color:'#78716C',textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:8}},c.l),
        React.createElement('div',{style:{fontFamily:"'Cormorant Garamond',serif",fontSize:26,fontWeight:600,color:'#1C1917',lineHeight:1}},c.v),
        React.createElement('div',{style:{fontSize:11,color:'#A8A29E',marginTop:6}},c.s)
      ))
    ),

    // Alerta inadimplência
    inadimplentes.length>0&&React.createElement('div',{style:{background:'#FFFBEB',border:'1px solid #FCD34D',borderRadius:12,padding:'14px 18px',marginBottom:16,display:'flex',alignItems:'flex-start',gap:12}},
      React.createElement('span',{style:{fontSize:18,flexShrink:0}},'⚠'),
      React.createElement('div',null,
        React.createElement('div',{style:{fontSize:13,fontWeight:500,color:'#92400E',marginBottom:4}},`${inadimplentes.length} recebimento${inadimplentes.length>1?'s':''} em aberto`),
        inadimplentes.map((x,i)=>React.createElement('div',{key:i,style:{fontSize:12,color:'#B45309'}},`${x.cliente} · ${x.servico} · ${MC[midx(x.mes)]} · ${brl(x.valor)}`))
      )
    ),

    React.createElement('div',{style:{display:'grid',gridTemplateColumns:'2fr 1fr',gap:12,marginBottom:12}},
      // Gráfico receita
      React.createElement(ChCard,{title:'Receita Mensal – Previsto × Recebido'},
        React.createElement(BarChart,{data:fluxo,keys:['prev','rec'],colors:['#E7E5E0','#A67C52'],labels:['Previsto','Recebido']}),
        React.createElement('div',{style:{display:'flex',gap:16,marginTop:10}},
          React.createElement(Leg,{cor:'#E7E5E0',label:'Previsto'}),
          React.createElement(Leg,{cor:'#A67C52',label:'Recebido'})
        )
      ),
      // Por serviço
      React.createElement(ChCard,{title:'Por Serviço'},
        porServico.length===0
          ?React.createElement(Empty,{msg:'Sem contratos'})
          :React.createElement('div',null,
              React.createElement(DonutChart,{data:porServico}),
              porServico.map((s,i)=>React.createElement('div',{key:i,style:{display:'flex',justifyContent:'space-between',fontSize:12,padding:'5px 0',borderTop:'1px solid #F0EDE8'}},
                React.createElement('div',{style:{display:'flex',gap:6,alignItems:'center',color:'#78716C'}},
                  React.createElement('span',{style:{width:8,height:8,borderRadius:'50%',background:CORES[i%CORES.length],flexShrink:0}}),s.n
                ),
                React.createElement('span',{style:{color:'#1C1917',fontWeight:500}},brl(s.v))
              ))
            )
      )
    ),

    React.createElement('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}},
      // Meta anual
      metaAnual>0&&React.createElement('div',{style:S.card},
        React.createElement('div',{style:{fontSize:11,color:'#78716C',textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:14}},'Meta Anual'),

function Contratos({data,upd,fluxo}){
  const [show,setShow]=useState(false);
  const [editId,setEditId]=useState(null);
  const [fichaId,setFichaId]=useState(null);
  const df=()=>({cliente:'',produtoId:'',servico:'',recorrente:true,valorMensal:'',valorTotal:'',numParcelas:3,valorParcela:'',mesInicio:mesNow(),forma:'Pix',obs:''});
  const [form,setForm]=useState(df());
  const set=(k,v)=>setForm(p=>({...p,[k]:v}));

  const prodAtivos=(data.produtos||[]).filter(p=>p.ativo);

  const selecionarProduto=(pid)=>{
    const prod=prodAtivos.find(p=>p.id===pid);
    if(!prod) return set('produtoId',pid);
    const rec=prod.tipo==='recorrente';
    setForm(p=>({...p,produtoId:pid,servico:prod.nome,recorrente:rec,
      valorMensal:rec?String(prod.preco):'',
      valorTotal:!rec?String(prod.preco):'',
      numParcelas:3,
      valorParcela:!rec?String((prod.preco/3).toFixed(2)):''

  };

  const abrir=(c=null)=>{
    setForm(c?{...c,valorMensal:String(c.valorMensal||''),valorTotal:String(c.valorTotal||''),valorParcela:String(c.valorParcela||''),numParcelas:c.numParcelas||3}:df());
    setEditId(c?.id||null); setShow(true); setFichaId(null);
  };
  const salvar=()=>{
    if(!form.cliente||!form.servico) return;
    const vm=parseFloat(form.valorMensal)||0, vt=parseFloat(form.valorTotal)||0, np=parseInt(form.numParcelas)||1;
    const vp=form.recorrente?vm:(vt/np);
    const c={...form,id:editId||gid(),valorMensal:vm,valorTotal:vt,numParcelas:np,valorParcela:vp,status:'ativo'};
    upd(p=>({...p,contratos:editId?p.contratos.map(x=>x.id===editId?c:x):[...p.contratos,c]}));
    setShow(false);
  };
  const enc=id=>{ if(confirm('Encerrar este contrato?')) upd(p=>({...p,contratos:p.contratos.map(c=>c.id===id?{...c,status:'encerrado',mesCancel:mesNow()}:c)})); };
  const del=id=>{ if(confirm('Excluir contrato?')) upd(p=>({...p,contratos:p.contratos.filter(c=>c.id!==id)})); };

  const conf=(cId,mes,valor)=>{const k=`${cId}_${mes}`;upd(p=>({...p,conf:{...p.conf,[k]:{ok:true,valor:parseFloat(valor)||0}}}));};
  const desconf=(cId,mes)=>{upd(p=>{const c={...p.conf};delete c[`${cId}_${mes}`];return{...p,conf:c};});};

  const ativos=data.contratos.filter(c=>c.status==='ativo');
  const encerrados=data.contratos.filter(c=>c.status!=='ativo');

    if(contrato) return React.createElement(FichaContrato,{
      contrato, conf:data.conf, fluxo, onVoltar:()=>setFichaId(null),
      onEditar:()=>abrir(contrato), onConf:conf, onDesconf:desconf
    });
  }

  return React.createElement('div',null,
    React.createElement('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}},
      React.createElement('span',{style:{fontSize:13,color:'#78716C'}},`${ativos.length} ativo${ativos.length!==1?'s':''}`),
      React.createElement('button',{onClick:()=>abrir(),style:S.prim},'+ Novo Contrato')
    ),

    show&&React.createElement('div',{style:S.formBox},
      React.createElement('div',{style:{fontFamily:"'Cormorant Garamond',serif",fontSize:20,fontWeight:600,color:'#1C1917',marginBottom:20}},editId?'Editar Contrato':'Novo Contrato'),
      React.createElement('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:14}},
        React.createElement(FLD,{label:'Cliente'},React.createElement('input',{style:S.inp,value:form.cliente,onChange:e=>set('cliente',e.target.value),placeholder:'Nome da fotógrafa'})),
        React.createElement(FLD,{label:'Produto / Serviço'},
          React.createElement('select',{style:S.inp,value:form.produtoId,onChange:e=>selecionarProduto(e.target.value)},
            React.createElement('option',{value:''},'Selecione...'),
            prodAtivos.map(p=>React.createElement('option',{key:p.id,value:p.id},p.nome)),
            React.createElement('option',{value:'__custom'},'Outro (personalizado)')
          )
        )
      ),
      form.produtoId==='__custom'&&React.createElement('div',{style:{marginBottom:14}},
        React.createElement(FLD,{label:'Nome do Serviço'},React.createElement('input',{style:S.inp,value:form.servico,onChange:e=>set('servico',e.target.value),placeholder:'Ex: Consultoria avulsa'}))
      ),
      React.createElement('div',{style:{marginBottom:14}},
        React.createElement(FLD,{label:'Tipo de Cobrança'},

            ),

      ),
      !form.recorrente&&parseFloat(form.valorTotal)>0&&React.createElement('div',{style:{background:'#F7F5F0',borderRadius:8,padding:'10px 14px',fontSize:13,color:'#78716C',marginBottom:14}},

      ),
      React.createElement('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:14}},
        React.createElement(FLD,{label:'Forma de Pagamento'},React.createElement('select',{style:S.inp,value:form.forma,onChange:e=>set('forma',e.target.value)},['Pix','Cartão','Boleto','Transferência'].map(f=>React.createElement('option',{key:f},f)))),

      ),

  );
}

// Calcula stats de um contrato
function calcStatsContrato(c, conf){
  const todas = gParcelas(c);
  const agora = mesNow();
  const passadas = todas.filter(p=>p.mes<=agora);
  const totalPrevisto = passadas.reduce((s,p)=>s+p.valor,0);
  const totalRecebido = passadas.reduce((s,p)=>{
    const k=`${c.id}_${p.mes}`;
    return s+(conf[k]?.ok ? (conf[k].valor??p.valor) : 0);
  },0);
  const emAberto = passadas.filter(p=>!conf[`${c.id}_${p.mes}`]?.ok).reduce((s,p)=>s+p.valor,0);
  const meses = passadas.length;
  return {totalPrevisto, totalRecebido, emAberto, meses};
}

        )

// ── MÉTRICAS ──────────────────────────────────────────────────────────────────
function Metricas({data,fluxo,mrr,ano}){
  const ativos=data.contratos.filter(c=>c.status==='ativo');
  const arr=mrr*12;
  const tk=ativos.length?ativos.reduce((s,c)=>s+(c.recorrente?c.valorMensal:c.valorParcela||0),0)/ativos.length:0;
  const encAno=data.contratos.filter(c=>c.status!=='ativo'&&c.mesCancel?.startsWith(String(ano))).length;
  const recMRR=ativos.filter(c=>c.recorrente).reduce((s,c)=>s+c.valorMensal,0);
  const recProj=ativos.filter(c=>!c.recorrente).reduce((s,c)=>s+(c.valorParcela||0),0);
  const totalRec=fluxo.reduce((s,m)=>s+m.rec,0);
  const totalDesp=fluxo.reduce((s,m)=>s+m.dReal,0);
  const margem=totalRec>0?((totalRec-totalDesp)/totalRec*100).toFixed(1):0;
  const margemBruta=totalRec>0?((totalRec-fluxo.reduce((s,m)=>s+m.dReal,0))/totalRec*100).toFixed(1):0;

  const porTipo=fluxo.map(m=>{
    let r=0,p=0;
    data.contratos.forEach(c=>{const ps=gParcelas(c).filter(x=>x.mes===m.mes);if(ps.length){if(c.recorrente)r+=ps[0].valor;else p+=ps[0].valor;}});
    return {...m,r,p};

  const cs=[

        React.createElement('div',{style:{fontSize:11,color:'#78716C',textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:8}},c.l),
        React.createElement('div',{style:{fontFamily:"'Cormorant Garamond',serif",fontSize:26,fontWeight:600,color:'#1C1917',lineHeight:1}},c.v),
        React.createElement('div',{style:{fontSize:11,color:'#A8A29E',marginTop:6}},c.s)
      ))
    ),
    React.createElement('div',{style:{...S.card,marginBottom:14}},
      React.createElement('div',{style:{fontSize:11,color:'#78716C',textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:14}},'Composição da Receita Ativa Mensal'),
      React.createElement('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:24}},
        React.createElement('div',null,
          React.createElement('div',{style:{fontFamily:"'Cormorant Garamond',serif",fontSize:30,fontWeight:600,color:'#A67C52'}},brl(recMRR)),
          React.createElement('div',{style:{fontSize:12,color:'#78716C',marginTop:4}},'Recorrente – Gestão Révem'),
          React.createElement('div',{style:{fontSize:12,color:'#A8A29E',marginTop:2}},`${ativos.filter(c=>c.recorrente).length} clientes ativos`)
        ),
        React.createElement('div',null,
          React.createElement('div',{style:{fontFamily:"'Cormorant Garamond',serif",fontSize:30,fontWeight:600,color:'#1C1917'}},brl(recProj)),
          React.createElement('div',{style:{fontSize:12,color:'#78716C',marginTop:4}},'Projeto – Operarte e outros'),

function Configuracoes({data,upd}){
  const [secao,setSecao]=useState('produtos');

  const [editProd,setEditProd]=useState(null);

  const [formCat,setFormCat]=useState({nome:'',subs:''});

  const prods=data.produtos||[];
  const cats=data.cats||CATS_DEFAULT;

  const salvarProd=()=>{
    if(!formProd.nome) return;
    const p={...formProd,id:editProd||gid(),preco:parseFloat(formProd.preco)||0,ativo:true};
    upd(d=>({...d,produtos:editProd?d.produtos.map(x=>x.id===editProd?p:x):[...d.produtos,p]}));
    setShowProd(false);
  };
  const delProd=id=>{if(confirm('Excluir produto?'))upd(d=>({...d,produtos:d.produtos.filter(p=>p.id!==id)}));};
  const togProd=id=>upd(d=>({...d,produtos:d.produtos.map(p=>p.id===id?{...p,ativo:!p.ativo}:p)}));
  const abrirProd=(p=null)=>{ setFormProd(p?{...p,preco:String(p.preco)}:{nome:'',tipo:'recorrente',preco:'',descricao:''}); setEditProd(p?.id||null); setShowProd(true); };

  const salvarCat=()=>{
    if(!formCat.nome) return;
    const c={id:gid(),nome:formCat.nome,subs:formCat.subs.split('\n').map(s=>s.trim()).filter(Boolean)};
    upd(d=>({...d,cats:[...(d.cats||CATS_DEFAULT),c]}));
    setFormCat({nome:'',subs:''});setShowCat(false);
  };
  const delCat=id=>{if(confirm('Excluir categoria?'))upd(d=>({...d,cats:(d.cats||CATS_DEFAULT).filter(c=>c.id!==id)}));};

  const btnTab=(id,l)=>React.createElement('button',{onClick:()=>setSecao(id),style:{...S.sec,borderColor:secao===id?'#A67C52':'#D4C8B8',color:secao===id?'#A67C52':'#78716C',fontWeight:secao===id?500:400}},l);

  return React.createElement('div',null,
    React.createElement('div',{style:{display:'flex',gap:8,marginBottom:24}},
      btnTab('produtos','Produtos e Serviços'),
      btnTab('cats','Categorias de Despesa')
    ),

    secao==='produtos'&&React.createElement('div',null,
      React.createElement('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}},
        React.createElement('div',{style:{fontSize:13,color:'#78716C'}},'Catálogo de produtos e serviços da Révem. Aparecem no cadastro de contratos.'),
        React.createElement('button',{onClick:()=>abrirProd(),style:S.prim},'+ Novo Produto')
      ),
      showProd&&React.createElement('div',{style:S.formBox},
        React.createElement('div',{style:{fontFamily:"'Cormorant Garamond',serif",fontSize:20,fontWeight:600,color:'#1C1917',marginBottom:20}},editProd?'Editar Produto':'Novo Produto'),
        React.createElement('div',{style:{display:'grid',gridTemplateColumns:'2fr 1fr',gap:12,marginBottom:14}},
          React.createElement(FLD,{label:'Nome do Produto / Serviço'},React.createElement('input',{style:S.inp,value:formProd.nome,onChange:e=>setFormProd(p=>({...p,nome:e.target.value})),placeholder:'Ex: Gestão Révem, Operarte...'})),
          React.createElement(FLD,{label:'Preço Base (R$)'},React.createElement('input',{style:S.inp,type:'number',value:formProd.preco,onChange:e=>setFormProd(p=>({...p,preco:e.target.value})),placeholder:'0,00'}))
        ),
        React.createElement('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:14}},
          React.createElement(FLD,{label:'Tipo de Cobrança'},
            React.createElement('select',{style:S.inp,value:formProd.tipo,onChange:e=>setFormProd(p=>({...p,tipo:e.target.value}))},
              React.createElement('option',{value:'recorrente'},'Recorrente – cobra todo mês'),
              React.createElement('option',{value:'projeto'},'Projeto – parcelado'),
              React.createElement('option',{value:'pontual'},'Pontual – cobrança única')
            )
          ),
          React.createElement(FLD,{label:'Descrição'},React.createElement('input',{style:S.inp,value:formProd.descricao,onChange:e=>setFormProd(p=>({...p,descricao:e.target.value})),placeholder:'Breve descrição'}))
        ),
        React.createElement('div',{style:{display:'flex',gap:10,justifyContent:'flex-end'}},
          React.createElement('button',{onClick:()=>setShowProd(false),style:S.sec},'Cancelar'),
          React.createElement('button',{onClick:salvarProd,style:S.prim},'Salvar')
        )
      ),
      prods.length===0&&!showProd&&React.createElement(Empty,{msg:'Nenhum produto cadastrado.'}),
      prods.map(p=>React.createElement('div',{key:p.id,style:{...S.card,display:'flex',alignItems:'center',gap:14,marginBottom:6,padding:'14px 18px',opacity:p.ativo?1:0.5}},
        React.createElement('div',{style:{width:7,height:7,borderRadius:'50%',background:p.ativo?'#A67C52':'#D4C8B8',flexShrink:0}}),
        React.createElement('div',{style:{flex:1}},
          React.createElement('div',{style:{fontSize:14,fontWeight:500,color:'#1C1917'}},p.nome),
          p.descricao&&React.createElement('div',{style:{fontSize:12,color:'#A8A29E',marginTop:2}},p.descricao)
        ),
        React.createElement(Chip,null,p.tipo==='recorrente'?'mensal':p.tipo==='projeto'?'projeto':'pontual'),
        React.createElement('div',{style:{fontFamily:"'Cormorant Garamond',serif",fontSize:18,fontWeight:600,color:'#1C1917'}},brl(p.preco)),
        React.createElement('div',{style:{display:'flex',gap:6}},
          React.createElement('button',{onClick:()=>abrirProd(p),style:{...S.sec,fontSize:12,padding:'4px 12px'}},'Editar'),
          React.createElement('button',{onClick:()=>togProd(p.id),style:{...S.sec,fontSize:12,padding:'4px 12px'}},p.ativo?'Desativar':'Ativar'),
          React.createElement('button',{onClick:()=>delProd(p.id),style:{...S.sec,fontSize:12,padding:'4px 12px',color:'#B45309'}},'×')
        )
      ))
    ),

    secao==='cats'&&React.createElement('div',null,
      React.createElement('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}},
        React.createElement('div',{style:{fontSize:13,color:'#78716C'}},'Categorias e subcategorias que aparecem no cadastro de despesas.'),
        React.createElement('button',{onClick:()=>setShowCat(true),style:S.prim},'+ Nova Categoria')
      ),
      showCat&&React.createElement('div',{style:S.formBox},
        React.createElement('div',{style:{fontFamily:"'Cormorant Garamond',serif",fontSize:20,fontWeight:600,color:'#1C1917',marginBottom:20}},'Nova Categoria'),
        React.createElement('div',{style:{marginBottom:14}},
          React.createElement(FLD,{label:'Nome da Categoria'},React.createElement('input',{style:S.inp,value:formCat.nome,onChange:e=>setFormCat(p=>({...p,nome:e.target.value})),placeholder:'Ex: Investimentos em Produto'}))
        ),
        React.createElement('div',{style:{marginBottom:14}},
          React.createElement(FLD,{label:'Subcategorias (uma por linha)'},
            React.createElement('textarea',{style:{...S.inp,height:100,resize:'vertical'},value:formCat.subs,onChange:e=>setFormCat(p=>({...p,subs:e.target.value})),placeholder:'Ex:\nCursos e capacitação\nLivros e materiais'})
          )
        ),
        React.createElement('div',{style:{display:'flex',gap:10,justifyContent:'flex-end'}},
          React.createElement('button',{onClick:()=>setShowCat(false),style:S.sec},'Cancelar'),
          React.createElement('button',{onClick:salvarCat,style:S.prim},'Salvar')
        )
      ),
      cats.map(cat=>React.createElement('div',{key:cat.id,style:{...S.card,marginBottom:8}},
        React.createElement('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:cat.subs?.length?10:0}},
          React.createElement('span',{style:{fontSize:14,fontWeight:500,color:'#1C1917'}},cat.nome),
          React.createElement('button',{onClick:()=>delCat(cat.id),style:{...S.sec,fontSize:12,padding:'3px 10px',color:'#B45309'}},'Excluir')
        ),
        cat.subs?.length>0&&React.createElement('div',{style:{display:'flex',flexWrap:'wrap',gap:6}},
          cat.subs.map((s,i)=>React.createElement('span',{key:i,style:{fontSize:11,background:'#F7F5F0',padding:'3px 10px',borderRadius:12,color:'#78716C'}},s))
        )
      ))
    )
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App(){
  const [authed,setAuthed]=useState(!!sessionStorage.getItem('revem_auth'));
  const [data,setData]=useState(null);
  const [status,setStatus]=useState('Conectando ao Firebase...');
  const [tab,setTab]=useState('dashboard');
  const [ano,setAno]=useState(ANO);

  useEffect(()=>{ loadFromFB().then(d=>{setData(d);setStatus('');}).catch(()=>setStatus('Erro ao conectar com Firebase. Verifique sua conexão.')); },[]);

  const upd=useCallback(fn=>setData(p=>{const next=fn(p);saveToFB(next);return next;}),[]);

  const fluxo=useMemo(()=>data?buildFluxo(data.contratos||[],data.despesas||[],data.conf||{},data.despReal||{},ano):[],[data,ano]);
  const mrr=useMemo(()=>data?calcMRR(data.contratos):0,[data]);
  const inadimplentes=useMemo(()=>data?calcInadimplentes(data.contratos,data.conf):[], [data]);
  const ma=mesNow();
  const fma=fluxo.find(f=>f.mes===ma)||{};
  const totalPrev=fluxo.reduce((s,m)=>s+m.prev,0);
  const totalRec=fluxo.reduce((s,m)=>s+m.rec,0);
  const porServico=useMemo(()=>{
    if(!data) return [];
    const mp={};
    data.contratos.forEach(c=>gParcelas(c).filter(p=>p.mes.startsWith(String(ano))).forEach(p=>{mp[c.servico]=(mp[c.servico]||0)+p.valor;}));
    return Object.entries(mp).map(([n,v])=>({n,v}));
  },[data,ano]);

  const TABS=[
    {id:'dashboard',l:'Dashboard'},
    {id:'contratos',l:'Contratos'},
    {id:'despesas',l:'Despesas'},
    {id:'fluxo',l:'Fluxo de Caixa'},
    {id:'metas',l:'Metas'},
    {id:'metricas',l:'Métricas'},
    {id:'config',l:'Configurações'},
  ];
  const TN={dashboard:'Dashboard',contratos:'Contratos',despesas:'Despesas',fluxo:'Fluxo de Caixa',metas:'Metas',metricas:'Métricas',config:'Configurações'};

  if(!authed) return React.createElement(Login,{onOk:()=>setAuthed(true)});
  if(status) return React.createElement('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',background:'#F7F5F0',fontSize:14,color:'#78716C',fontFamily:"'DM Sans',sans-serif"}},status);
  if(!data) return null;

  return React.createElement('div',{style:{display:'flex',minHeight:'100vh',background:'#F7F5F0',fontFamily:"'DM Sans',sans-serif"}},
    // SIDEBAR
    React.createElement('aside',{style:{width:210,background:'#F0EDE8',borderRight:'1px solid #E7E5E0',display:'flex',flexDirection:'column',padding:'26px 0',flexShrink:0,position:'sticky',top:0,height:'100vh',overflowY:'auto'}},
      React.createElement('div',{style:{padding:'0 18px',marginBottom:28}},
        React.createElement('div',{style:{fontFamily:"'Cormorant Garamond',serif",fontSize:22,color:'#1C1917',fontWeight:600,letterSpacing:'0.02em'}},'Révem'),
        React.createElement('div',{style:{fontSize:10,color:'#A8A29E',letterSpacing:'0.15em',textTransform:'uppercase',marginTop:2}},'Sistema Financeiro')
      ),
      React.createElement('nav',{style:{flex:1}},
        TABS.map(t=>React.createElement('button',{key:t.id,onClick:()=>setTab(t.id),style:{
          display:'flex',alignItems:'center',width:'100%',padding:'10px 18px',
          background:tab===t.id?'#fff':'transparent',
          border:'none',borderLeft:tab===t.id?'2px solid #A67C52':'2px solid transparent',
          color:tab===t.id?'#1C1917':'#78716C',
          fontSize:13,cursor:'pointer',textAlign:'left',fontFamily:"'DM Sans',sans-serif",
          fontWeight:tab===t.id?500:400,
        }},
          t.l,
          t.id==='dashboard'&&inadimplentes.length>0&&React.createElement('span',{style:{marginLeft:'auto',fontSize:10,background:'#FCD34D',color:'#92400E',padding:'1px 6px',borderRadius:8}},inadimplentes.length)
        ))
      ),
      React.createElement('div',{style:{padding:'16px 18px',borderTop:'1px solid #E7E5E0',marginBottom:8}},
        React.createElement('div',{style:{fontSize:10,color:'#A8A29E',letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:4}},'MRR Atual'),
        React.createElement('div',{style:{fontFamily:"'Cormorant Garamond',serif",fontSize:22,color:'#A67C52',fontWeight:600}},brl(mrr))
      ),
      React.createElement('div',{style:{padding:'0 12px 12px',display:'flex',flexDirection:'column',gap:6}},
        React.createElement('button',{onClick:()=>exportarJSON(data),style:{background:'transparent',color:'#A8A29E',border:'1px solid #E7E5E0',borderRadius:6,padding:'6px 10px',fontSize:11,cursor:'pointer',textAlign:'left',fontFamily:"'DM Sans',sans-serif"}},'↓ Exportar backup'),
        React.createElement('label',{style:{background:'transparent',color:'#A8A29E',border:'1px solid #E7E5E0',borderRadius:6,padding:'6px 10px',fontSize:11,cursor:'pointer',display:'block'}},
          '↑ Importar backup',
          React.createElement('input',{type:'file',accept:'.json',onChange:e=>{const f=e.target.files[0];if(f)importarJSON(f,d=>setData(d));e.target.value='';},style:{display:'none'}})
        )
      )
    ),

    // MAIN
    React.createElement('main',{style:{flex:1,padding:'28px 32px',minWidth:0,overflowY:'auto'}},
      React.createElement('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24}},
        React.createElement('h1',{style:{fontFamily:"'Cormorant Garamond',serif",fontSize:26,fontWeight:600,color:'#1C1917',margin:0}},TN[tab]),
        React.createElement('div',{style:{display:'flex',gap:8,alignItems:'center'}},
          React.createElement('button',{onClick:()=>setAno(a=>a-1),style:S.sec},'‹'),
          React.createElement('span',{style:{fontSize:14,fontWeight:500,color:'#1C1917',minWidth:44,textAlign:'center'}},ano),
          React.createElement('button',{onClick:()=>setAno(a=>a+1),style:S.sec},'›')
        )
      ),
      tab==='dashboard'&&React.createElement(Dashboard,{fluxo,mrr,fma,totalPrev,totalRec,porServico,inadimplentes,data,ano}),
      tab==='contratos'&&React.createElement(Contratos,{data,upd,fluxo}),
      tab==='despesas'&&React.createElement(Despesas,{data,upd}),
      tab==='fluxo'&&React.createElement(FluxoCaixa,{fluxo,data,upd}),
      tab==='metas'&&React.createElement(Metas,{data,upd,fluxo,ano}),
      tab==='metricas'&&React.createElement(Metricas,{data,fluxo,mrr,ano}),
      tab==='config'&&React.createElement(Configuracoes,{data,upd})
    )
  );
}

ReactDOM.render(React.createElement(App), document.getElementById('root'));
</script>
</body>
</html>
